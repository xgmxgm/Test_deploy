<style>
	.auth-container {
		max-width: 400px;
		margin: 60px auto;
		padding: 30px;
		border-radius: 16px;
		background: #ffffff;
		box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
		font-family: Arial, sans-serif;
	}

	.auth-container h2 {
		text-align: center;
		margin-bottom: 20px;
	}

	.auth-container form p {
		margin-bottom: 15px;
	}

	.auth-container input {
		width: 100%;
		padding: 10px;
		border-radius: 8px;
		border: 1px solid #ddd;
		outline: none;
		transition: border 0.2s;
	}

	.auth-container input:focus {
		border-color: #4f46e5;
	}

	.auth-container button {
		width: 100%;
		padding: 12px;
		border: none;
		border-radius: 8px;
		background: #4f46e5;
		color: white;
		font-weight: bold;
		cursor: pointer;
		transition: background 0.2s;
	}

	.auth-container button:hover {
		background: #4338ca;
	}

	.auth-container a {
		display: block;
		text-align: center;
		margin-top: 15px;
		color: #4f46e5;
		text-decoration: none;
	}

	.auth-container a:hover {
		text-decoration: underline;
	}
</style>

<div class="auth-container">
	<h2>Вход</h2>

	<form method="POST">
		{% csrf_token %} {{ form.as_p }}

		<button type="submit">Войти</button>
	</form>

	<a href="{% url 'register' %}"> Нет аккаунта? Зарегистрироваться </a>
</div>
