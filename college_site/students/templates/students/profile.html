{% load static %}

<!doctype html>
<html>
	<head>
		<title>Профиль</title>
		<link rel="stylesheet" href="{% static 'css/style.css' %}" />
		<style>
			.container {
				max-width: 600px;
				margin: 60px auto;
				padding: 30px;
				border-radius: 16px;
				background: #fff;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
				font-family: Arial;
				color: black;
			}

			.header {
				display: flex;
				justify-content: space-between;
				margin-bottom: 20px;
			}

			.user-info {
				margin-top: 20px;
			}

			.user-info p {
				margin: 10px 0;
				font-size: 16px;
			}

			.btn {
				padding: 10px 15px;
				border-radius: 8px;
				border: none;
				cursor: pointer;
				text-decoration: none;
			}

			.btn-primary {
				background: #4f46e5;
				color: white;
			}

			.btn-danger {
				background: #ef4444;
				color: white;
			}

			.btn:hover {
				opacity: 0.9;
			}

			form {
				display: inline;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="header">
				<a href="{% url 'student_list' %}" class="btn">← Назад</a>

				<form method="POST" action="{% url 'logout' %}">
					{% csrf_token %}
					<button class="btn btn-danger">Выйти</button>
				</form>
			</div>

			<h2>Профиль</h2>

			<div class="user-info">
				<p><strong>Username:</strong> {{ user.username }}</p>
				<p><strong>Email:</strong> {{ user.email }}</p>
				<p><strong>Имя:</strong> {{ user.first_name }}</p>
				<p><strong>Фамилия:</strong> {{ user.last_name }}</p>
				<p><strong>Дата регистрации:</strong> {{ user.date_joined }}</p>
			</div>
		</div>
	</body>
</html>
